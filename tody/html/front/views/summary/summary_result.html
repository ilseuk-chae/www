<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>토디 - 매물 요약 정보</title>
    <link rel="shortcut icon" href="/front/assets/image/favicon.ico" />
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/fonts.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="/front/assets/css/summarycss.css" rel="stylesheet" type="text/css" />
</head>
<body class="summary-page">

<div class="page-wrapper">

    <!-- ===== 헤더 ===== -->
    <div class="page-header no-print">
        <div class="logo-area">
            <div class="logo-icon">T</div>
            <h1>TODY 매물 요약</h1>
        </div>
        <div class="date-info" id="todayDate"></div>
    </div>

    <!-- ===== 데이터 없음 ===== -->
    <div id="noDataSection" class="no-data" style="display:none;">
        <h2>표시할 매물 데이터가 없습니다</h2>
        <p>입력 페이지에서 매물 정보를 먼저 입력해 주세요.</p>
        <a href="/front/views/summary/summary_input.html">매물 정보 입력하기</a>
    </div>

    <!-- ===== 결과 카드 ===== -->
    <div id="resultSection" style="display:none;">
        <div class="summary-card" id="summaryCard">
            <!-- 상단 배너 -->
            <div class="card-banner">
                <div class="property-type-badge" id="r_typeBadge"></div>
                <h2 id="r_title"></h2>
                <div class="address" id="r_address"></div>
            </div>

            <!-- 핵심 수치 -->
            <div class="key-info-grid" id="keyInfoGrid"></div>

            <!-- 상세 정보 -->
            <div class="detail-section">
                <h3>상세 정보</h3>
                <table class="detail-table" id="detailTable">
                    <tbody></tbody>
                </table>
            </div>

            <!-- AI 분석 + 입력 특장점 통합 영역 -->
            <div class="ai-section">
                <div class="ai-box">
                    <div class="ai-header">
                        <div class="ai-icon">AI</div>
                        <h4>AI 분석 특장점</h4>
                    </div>
                    <!-- 사용자 입력 특장점 (있을 때만 AI 분석 위에 강조) -->
                    <div id="r_userHighlight" style="display:none;"></div>
                    <!-- AI 분석 내용 -->
                    <div class="ai-content" id="r_aiContent"></div>
                </div>
            </div>

            <!-- 하단 정보 -->
            <div class="card-footer-info">
                <span>TODY 부동산 종합 플랫폼 | tody.co.kr</span>
                <span>본 요약은 참고용이며, 정확한 정보는 등기부등본 및 토지이용계획을 확인하시기 바랍니다.</span>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="action-buttons no-print">
            <a class="btn-action btn-back" href="/front/views/summary/summary_input.html">다시 입력</a>
            <button class="btn-action btn-print" onclick="window.print()">인쇄하기</button>
            <button class="btn-action btn-pdf" onclick="downloadPDF()">PDF 저장</button>
        </div>
    </div>

</div>

<!-- jsPDF & html2canvas (로컬) -->
<script src="/front/assets/js/html2canvas.min.js"></script>
<script src="/front/assets/js/jspdf.umd.min.js"></script>

<script>
(function() {
    'use strict';

    var pyeongToM2 = 3.305785;

    // ===== 날짜 =====
    var today = new Date();
    var dateStr = today.getFullYear() + '년 ' +
        String(today.getMonth() + 1).padStart(2, '0') + '월 ' +
        String(today.getDate()).padStart(2, '0') + '일';
    document.getElementById('todayDate').textContent = '작성일: ' + dateStr;

    // ===== sessionStorage에서 데이터 읽기 =====
    var raw = sessionStorage.getItem('summaryData');
    if (!raw) {
        document.getElementById('noDataSection').style.display = 'block';
        return;
    }

    var data;
    try {
        data = JSON.parse(raw);
    } catch (e) {
        document.getElementById('noDataSection').style.display = 'block';
        return;
    }

    // AI features가 없으면 fallback 생성
    if (!data.aiFeatures || !Array.isArray(data.aiFeatures) || data.aiFeatures.length === 0) {
        data.aiFeatures = getDefaultAiResult(data);
    }

    // 결과 렌더링
    renderResult(data);
    document.getElementById('resultSection').style.display = 'block';


    // ===== AI 기본 결과 (fallback) =====
    function getDefaultAiResult(d) {
        var features = [];
        var fullAddr = d.address + (d.addressDetail ? ' ' + d.addressDetail : '');
        features.push('<strong>위치:</strong> ' + escapeHtml(fullAddr) + ' 소재 ' + escapeHtml(d.estateType) + ' 매물입니다.');

        if (d.landArea > 0) {
            var pricePerPyeong = d.price > 0 ? Math.round(d.price / d.landArea) : 0;
            features.push('<strong>토지면적:</strong> ' + d.landArea.toLocaleString() + '평 규모의 토지입니다.');
            if (pricePerPyeong > 0) {
                features.push('<strong>평당가:</strong> 약 ' + formatKoreanPrice(pricePerPyeong) + '/평 수준입니다.');
            }
        }
        if (d.buildingArea > 0) {
            features.push('<strong>건축면적:</strong> ' + d.buildingArea.toLocaleString() + '평 규모입니다.');
        }
        if (d.totalFloorArea > 0) {
            features.push('<strong>연면적:</strong> ' + d.totalFloorArea.toLocaleString() + '평 규모입니다.');
        }
        if (d.exchangeYn === '가능') {
            features.push('<strong>교환 거래:</strong> 교환이 가능하여 유연한 거래 구조 설계가 가능합니다.');
        }
        features.push('<strong>참고:</strong> AI API 키 설정 시 더 상세한 입지 분석, 교통, 개발 전망 등을 자동 확인할 수 있습니다.');
        return features;
    }


    // ===== 결과 렌더링 =====
    function renderResult(d) {
        var fullAddr = d.address + (d.addressDetail ? ' ' + d.addressDetail : '');
        var priceText = d.priceText || formatKoreanPrice(d.price);

        // 배너
        document.getElementById('r_typeBadge').textContent = d.estateType;
        document.getElementById('r_title').textContent = fullAddr.replace(/ 일원$/, '');
        document.getElementById('r_address').textContent = fullAddr;

        // 핵심 수치 그리드
        var gridHtml = '';
        if (d.landArea > 0) {
            gridHtml += buildKeyInfoItem('토지면적',
                d.landArea.toLocaleString() + '<span class="unit">평</span>',
                '≒ ' + (d.landArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²');
        }
        if (d.buildingArea > 0) {
            gridHtml += buildKeyInfoItem('건축면적',
                d.buildingArea.toLocaleString() + '<span class="unit">평</span>',
                '≒ ' + (d.buildingArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²');
        }
        if (d.totalFloorArea > 0) {
            gridHtml += buildKeyInfoItem('연면적',
                d.totalFloorArea.toLocaleString() + '<span class="unit">평</span>',
                '≒ ' + (d.totalFloorArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²');
        }
        gridHtml += buildKeyInfoItem('매매가격',
            priceText.replace('원', '') + '<span class="unit">원</span>',
            d.landArea > 0 ? '평당 약 ' + Math.round(d.price / d.landArea).toLocaleString() + '원' : '',
            'price');

        var exchangeBadge = d.exchangeYn === '가능'
            ? '<span class="badge-sale">매각</span> <span class="badge-exchange">교환가능</span>'
            : '<span class="badge-sale">매각</span> <span class="badge-not-available">교환불가</span>';
        gridHtml += '<div class="key-info-item"><div class="label">거래방식</div>' +
            '<div class="value" style="font-size:18px;">' + exchangeBadge + '</div>' +
            '<div class="sub-value">' + (d.exchangeYn === '가능' ? '매각 우선, 교환 협의 가능' : '매각만 가능') + '</div></div>';

        document.getElementById('keyInfoGrid').innerHTML = gridHtml;

        // 상세 테이블
        var rows = [
            ['매물유형', escapeHtml(d.estateType)],
            ['소재지', escapeHtml(fullAddr)]
        ];
        if (d.landArea > 0) rows.push(['토지면적', '<strong>' + d.landArea.toLocaleString() + '평</strong> (' + (d.landArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²)']);
        if (d.buildingArea > 0) rows.push(['건축면적', '<strong>' + d.buildingArea.toLocaleString() + '평</strong> (' + (d.buildingArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²)']);
        if (d.totalFloorArea > 0) rows.push(['연면적', '<strong>' + d.totalFloorArea.toLocaleString() + '평</strong> (' + (d.totalFloorArea * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²)']);
        rows.push(['매매가격', '<strong style="color:#dc2626;">' + escapeHtml(priceText) + '</strong> (' + d.price.toLocaleString() + '원)']);
        if (d.landArea > 0) {
            rows.push(['평당가', '약 ' + Math.round(d.price / d.landArea).toLocaleString() + '원 / 평']);
        }
        rows.push(['교환 가능여부', d.exchangeYn === '가능' ? '<span class="badge-exchange">교환 가능</span>' : '<span class="badge-not-available">교환 불가</span>']);

        var tbody = document.getElementById('detailTable').querySelector('tbody');
        tbody.innerHTML = rows.map(function(r) {
            return '<tr><th>' + r[0] + '</th><td>' + r[1] + '</td></tr>';
        }).join('');

        // 사용자 입력 특장점 (있으면 AI 분석 위에 강조)
        var highlightEl = document.getElementById('r_userHighlight');
        if (d.userFeatures && d.userFeatures.trim()) {
            var featureLines = d.userFeatures.split('\n').filter(function(l) { return l.trim(); });
            highlightEl.innerHTML =
                '<div class="user-highlight">' +
                '<div class="uh-label"><span class="star">\u2605</span> 매물 특장점</div>' +
                '<ul>' + featureLines.map(function(l) { return '<li>' + escapeHtml(l.trim()) + '</li>'; }).join('') + '</ul>' +
                '</div>';
            highlightEl.style.display = 'block';
        } else {
            highlightEl.style.display = 'none';
        }

        // AI 분석 특장점
        if (Array.isArray(d.aiFeatures) && d.aiFeatures.length > 0) {
            document.getElementById('r_aiContent').innerHTML =
                '<ul>' + d.aiFeatures.map(function(f) { return '<li>' + f + '</li>'; }).join('') + '</ul>';
        }
    }


    // ===== 유틸 함수 =====
    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function formatKoreanPrice(num) {
        var eok = Math.floor(num / 100000000);
        var man = Math.floor((num % 100000000) / 10000);
        var won = num % 10000;
        var result = '';
        if (eok > 0) result += eok + '억 ';
        if (man > 0) result += man.toLocaleString() + '만';
        if (won > 0) result += ' ' + won.toLocaleString();
        result += '원';
        return result.trim();
    }

    function buildKeyInfoItem(label, valueHtml, subValue, extraClass) {
        return '<div class="key-info-item">' +
            '<div class="label">' + label + '</div>' +
            '<div class="value' + (extraClass ? ' ' + extraClass : '') + '">' + valueHtml + '</div>' +
            (subValue ? '<div class="sub-value">' + subValue + '</div>' : '') +
            '</div>';
    }


    // ===== PDF 다운로드 =====
    window.downloadPDF = function() {
        var card = document.getElementById('summaryCard');
        var buttons = document.querySelectorAll('.no-print');
        buttons.forEach(function(el) { el.style.display = 'none'; });

        html2canvas(card, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff'
        }).then(function(canvas) {
            var jsPDF = window.jspdf.jsPDF;
            var imgData = canvas.toDataURL('image/jpeg', 0.95);
            var imgWidth = 210; // A4 width mm
            var imgHeight = canvas.height * imgWidth / canvas.width;

            var pdf = new jsPDF('p', 'mm', 'a4');

            if (imgHeight > 297) {
                imgHeight = 290;
                imgWidth = canvas.width * imgHeight / canvas.height;
                var xOffset = (210 - imgWidth) / 2;
                pdf.addImage(imgData, 'JPEG', xOffset, 4, imgWidth, imgHeight);
            } else {
                pdf.addImage(imgData, 'JPEG', 0, 4, imgWidth, imgHeight);
            }

            var addr = document.getElementById('r_title').textContent || '매물요약';
            pdf.save('TODY_매물요약_' + addr.substring(0, 20) + '.pdf');

            buttons.forEach(function(el) { el.style.display = ''; });
        }).catch(function(err) {
            console.error('PDF 생성 실패:', err);
            alert('PDF 생성에 실패했습니다.');
            buttons.forEach(function(el) { el.style.display = ''; });
        });
    };

})();
</script>
</body>
</html>
