<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>토디 - 매물 요약 정보 입력</title>
    <link rel="shortcut icon" href="/front/assets/image/favicon.ico" />
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/fonts.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="/front/assets/css/summarycss.css" rel="stylesheet" type="text/css" />
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="summary-page">

<!-- ===== 로딩 오버레이 ===== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
        <div class="loading-spinner"></div>
        <p>AI가 매물 정보를 분석하고 있습니다</p>
        <p class="sub">잠시만 기다려 주세요...</p>
    </div>
</div>

<div class="page-wrapper">

    <!-- ===== 헤더 ===== -->
    <div class="page-header">
        <div class="logo-area">
            <div class="logo-icon">T</div>
            <h1>TODY 매물 요약</h1>
        </div>
        <div class="date-info" id="todayDate"></div>
    </div>

    <!-- ===== 입력 폼 ===== -->
    <form id="summaryForm" class="form-card">
        <div class="form-title-row">
            <h2>매물 정보 입력</h2>
            <button type="button" class="btn-clear" onclick="clearForm()">내용지우기</button>
        </div>

        <!-- 매물유형 -->
        <div class="form-row">
            <div class="form-group">
                <label>매물유형 <span class="required">*</span></label>
                <select name="estateType" id="estateType" required>
                    <option value="">선택하세요</option>
                    <option value="토지">토지</option>
                    <option value="공장">공장</option>
                    <option value="상가">상가</option>
                    <option value="아파트">아파트</option>
                    <option value="다세대">다세대</option>
                    <option value="단독주택">단독주택</option>
                    <option value="건물">건물</option>
                    <option value="창고">창고</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label>교환 가능여부 <span class="required">*</span></label>
                <select name="exchangeYn" id="exchangeYn" required>
                    <option value="불가">불가</option>
                    <option value="가능">가능</option>
                </select>
            </div>
        </div>

        <!-- 주소 -->
        <div class="form-row full">
            <div class="form-group">
                <label>소재지 주소 <span class="required">*</span></label>
                <div class="input-with-btn">
                    <input type="text" name="address" id="address" placeholder="주소를 검색하세요" required readonly />
                    <button type="button" class="btn-search-addr" onclick="searchAddress()">주소 검색</button>
                </div>
                <input type="hidden" name="postal_code" id="postal_code" />
                <input type="hidden" name="address_road" id="address_road" />
                <input type="hidden" name="address_jibun" id="address_jibun" />
                <input type="hidden" name="sido" id="sido" />
                <input type="hidden" name="sigungu" id="sigungu" />
            </div>
        </div>
        <div class="form-row full">
            <div class="form-group">
                <label>상세주소</label>
                <input type="text" name="addressDetail" id="addressDetail" placeholder="상세 주소 입력 (선택)" />
            </div>
        </div>

        <!-- 면적 -->
        <div class="form-row">
            <div class="form-group">
                <label>토지면적 (평)</label>
                <input type="number" name="landArea" id="landArea" placeholder="예: 2003" step="0.01" min="0" />
                <div class="area-unit" id="landAreaM2"></div>
            </div>
            <div class="form-group">
                <label>건축면적 (평)</label>
                <input type="number" name="buildingArea" id="buildingArea" placeholder="예: 500" step="0.01" min="0" />
                <div class="area-unit" id="buildingAreaM2"></div>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>연면적 (평)</label>
                <input type="number" name="totalFloorArea" id="totalFloorArea" placeholder="예: 1200" step="0.01" min="0" />
                <div class="area-unit" id="totalFloorAreaM2"></div>
            </div>
            <div class="form-group">
                <label>매매가격 <span class="required">*</span></label>
                <input type="text" name="price" id="price" placeholder="예: 32억 480만원 또는 3200480000" required />
                <div class="hint">숫자 입력 시 자동 변환됩니다 (예: 3200480000 → 32억 480만원)</div>
            </div>
        </div>

        <!-- 특장점 입력 -->
        <div class="form-row full">
            <div class="form-group">
                <label>특이사항 (직접 입력)</label>
                <textarea name="userFeatures" id="userFeatures" placeholder="표시되기를 매물의 원하는 특이사항을 직접 입력하세요&#10;예: 대로변 접근성 우수, 주변 개발 호재 등"></textarea>
            </div>
        </div>

        <!-- AI 설정 -->
        <div class="ai-config">
            <label>AI 분석 엔진</label>
            <select name="aiProvider" id="aiProvider">
                <option value="chatgpt" selected>ChatGPT (GPT-4o-mini)</option>
                <option value="gemini">Google Gemini</option>
                <!--<option value="huggingface">HuggingFace Inference</option> -->
            </select>
            <span class="hint" style="margin-left:8px;">AI가 매물의 입지, 교통, 개발 전망 등을 자동 분석합니다</span>
        </div>

        <!-- 제출 -->
        <button type="submit" class="btn-generate" id="btnGenerate">
            요약 카드 생성하기
        </button>
    </form>

</div>

<script>
(function() {
    'use strict';

    // ===== 초기화 =====
    var today = new Date();
    var dateStr = today.getFullYear() + '년 ' +
        String(today.getMonth() + 1).padStart(2, '0') + '월 ' +
        String(today.getDate()).padStart(2, '0') + '일';
    document.getElementById('todayDate').textContent = '작성일: ' + dateStr;

    // ===== 이전 입력값 복원 (결과 페이지에서 "다시 입력" 클릭 시) =====
    var savedData = sessionStorage.getItem('summaryData');
    if (savedData) {
        try {
            var d = JSON.parse(savedData);
            if (d.estateType) document.getElementById('estateType').value = d.estateType;
            if (d.exchangeYn) document.getElementById('exchangeYn').value = d.exchangeYn;
            if (d.address) {
                var addrInput = document.getElementById('address');
                addrInput.removeAttribute('readonly');
                addrInput.value = d.address;
                addrInput.setAttribute('readonly', '');
            }
            if (d.addressDetail) document.getElementById('addressDetail').value = d.addressDetail;
            if (d.sido) document.getElementById('sido').value = d.sido;
            if (d.sigungu) document.getElementById('sigungu').value = d.sigungu;
            if (d.landArea) {
                document.getElementById('landArea').value = d.landArea;
                document.getElementById('landArea').dispatchEvent(new Event('input'));
            }
            if (d.buildingArea) {
                document.getElementById('buildingArea').value = d.buildingArea;
                document.getElementById('buildingArea').dispatchEvent(new Event('input'));
            }
            if (d.totalFloorArea) {
                document.getElementById('totalFloorArea').value = d.totalFloorArea;
                document.getElementById('totalFloorArea').dispatchEvent(new Event('input'));
            }
            if (d.priceText) {
                var priceInput = document.getElementById('price');
                priceInput.value = d.priceText;
                if (d.price) priceInput.dataset.rawPrice = d.price;
            }
            if (d.userFeatures) document.getElementById('userFeatures').value = d.userFeatures;
            if (d.aiProvider) document.getElementById('aiProvider').value = d.aiProvider;
        } catch (e) {
            // 복원 실패 시 무시
        }
    }

    // ===== 내용지우기 =====
    window.clearForm = function() {
        document.getElementById('summaryForm').reset();
        document.getElementById('address').value = '';
        document.getElementById('postal_code').value = '';
        document.getElementById('address_road').value = '';
        document.getElementById('address_jibun').value = '';
        document.getElementById('sido').value = '';
        document.getElementById('sigungu').value = '';
        document.getElementById('price').dataset.rawPrice = '';
        document.getElementById('landAreaM2').textContent = '';
        document.getElementById('buildingAreaM2').textContent = '';
        document.getElementById('totalFloorAreaM2').textContent = '';
        sessionStorage.removeItem('summaryData');
    };

    // ===== 주소 검색 (Daum Postcode) =====
    window.searchAddress = function() {
        new daum.Postcode({
            oncomplete: function(data) {
                var addr = data.jibunAddress || data.autoJibunAddress || data.address;
                document.getElementById('address').value = addr;
                document.getElementById('postal_code').value = data.zonecode;
                document.getElementById('address_road').value = data.roadAddress;
                document.getElementById('address_jibun').value = data.jibunAddress || data.autoJibunAddress;
                document.getElementById('sido').value = data.sido;
                document.getElementById('sigungu').value = data.sigungu;
                document.getElementById('addressDetail').focus();
            }
        }).open();
    };

    // ===== 면적 변환 (평 → m²) =====
    var pyeongToM2 = 3.305785;
    ['landArea', 'buildingArea', 'totalFloorArea'].forEach(function(id) {
        var input = document.getElementById(id);
        var display = document.getElementById(id + 'M2');
        input.addEventListener('input', function() {
            var val = parseFloat(this.value);
            if (val > 0) {
                display.textContent = '≒ ' + (val * pyeongToM2).toLocaleString('ko-KR', {maximumFractionDigits: 2}) + ' m²';
            } else {
                display.textContent = '';
            }
        });
    });

    // ===== 가격 자동 변환 =====
    document.getElementById('price').addEventListener('blur', function() {
        var val = this.value.replace(/[,\s]/g, '');
        var num = parseInt(val, 10);
        if (!isNaN(num) && num > 10000) {
            this.value = formatKoreanPrice(num);
            this.dataset.rawPrice = num;
        } else if (val.match(/[억만원]/)) {
            var parsed = parseKoreanPrice(val);
            if (parsed > 0) {
                this.dataset.rawPrice = parsed;
            }
        }
    });

    function formatKoreanPrice(num) {
        var eok = Math.floor(num / 100000000);
        var man = Math.floor((num % 100000000) / 10000);
        var won = num % 10000;
        var result = '';
        if (eok > 0) result += eok + '억 ';
        if (man > 0) result += man.toLocaleString() + '만';
        if (won > 0) result += ' ' + won.toLocaleString();
        result += '원';
        return result.trim();
    }

    function parseKoreanPrice(str) {
        str = str.replace(/[,\s원]/g, '');
        var total = 0;
        var eokMatch = str.match(/(\d+)억/);
        var manMatch = str.match(/(\d+)만/);
        if (eokMatch) total += parseInt(eokMatch[1]) * 100000000;
        if (manMatch) total += parseInt(manMatch[1]) * 10000;
        var remainder = str.replace(/\d+억/, '').replace(/\d+만/, '').trim();
        if (remainder && !isNaN(parseInt(remainder))) {
            total += parseInt(remainder);
        }
        return total;
    }

    function getRawPrice() {
        var input = document.getElementById('price');
        if (input.dataset.rawPrice) return parseInt(input.dataset.rawPrice);
        var val = input.value.replace(/[,\s]/g, '');
        var num = parseInt(val, 10);
        if (!isNaN(num) && num > 0) return num;
        return parseKoreanPrice(input.value);
    }

    // ===== 폼 제출 → AI 호출 → 결과 페이지로 이동 =====
    document.getElementById('summaryForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var formData = {
            estateType: document.getElementById('estateType').value,
            address: document.getElementById('address').value,
            addressDetail: document.getElementById('addressDetail').value,
            sido: document.getElementById('sido').value,
            sigungu: document.getElementById('sigungu').value,
            landArea: parseFloat(document.getElementById('landArea').value) || 0,
            buildingArea: parseFloat(document.getElementById('buildingArea').value) || 0,
            totalFloorArea: parseFloat(document.getElementById('totalFloorArea').value) || 0,
            price: getRawPrice(),
            priceText: document.getElementById('price').value,
            exchangeYn: document.getElementById('exchangeYn').value,
            userFeatures: document.getElementById('userFeatures').value,
            aiProvider: document.getElementById('aiProvider').value
        };

        if (!formData.estateType || !formData.address || !formData.price) {
            alert('필수 항목(매물유형, 주소, 매매가격)을 입력해 주세요.');
            return;
        }

        // 로딩 표시
        var loading = document.getElementById('loadingOverlay');
        loading.classList.add('active');
        document.getElementById('btnGenerate').disabled = true;

        // AI API 호출
        fetch('/front/back/summary/ai_generate.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(function(res) { return res.json(); })
        .then(function(json) {
            if (json.statusCode === 200 && json.data && json.data.features) {
                formData.aiFeatures = json.data.features;
            } else {
                formData.aiFeatures = null;
            }
        })
        .catch(function(err) {
            console.error('AI 호출 실패:', err);
            formData.aiFeatures = null;
        })
        .finally(function() {
            // sessionStorage에 데이터 저장 후 결과 페이지로 이동
            sessionStorage.setItem('summaryData', JSON.stringify(formData));
            loading.classList.remove('active');
            document.getElementById('btnGenerate').disabled = false;
            window.location.href = '/front/views/summary/summary_result.html';
        });
    });

})();
</script>
</body>
</html>
