            <script>
                fetch('../00-include/mobile.html')
                    .then(response => response.text())
                    .then(html => {
                        const container = document.querySelector('.mobile');
                        container.innerHTML = html;

                        const bg = container.querySelector('.mobile-menu-info-bg');
                        if (bg) {
                        bg.style.display = 'none'; // display를 명시적으로 다시 숨김
                        // 혹은 bg.classList.add('hidden-class'); 등 원하는 제어 추가 가능
                        }

                        // ★ mobile.html 내용이 DOM에 추가된 후, layout.js의 함수 호출
                        /*
                        if (typeof loadMobile === 'function') {
                            loadMobile();

                        }
                        */
                    })
                    .catch(console.error);
              </script>
            <!-- MOBILE - 상단/메뉴/하단영역 끝 -->

                <!-- 서브메뉴 -->

                <!-- 서브메뉴 끝 -->

                <!-- 타이틀 영역 -->
                <div class="title-area">
                    <h2>내 정보</h2>
                </div>
                <!-- 타이틀 영역 끝 -->

                <!-- 알림설정 -->
                <div class="mypage-general-member">
                    <!-- 등록 -->
                    <form class="signup fw-size1 needs-validation" novalidate>
                        <div>
                            <div class="label-wrap">
                                <h2 class="label-text">아이디</h2>
                            </div>
                            <p>
                                <input type="text" id="id" class="form-control input-box w100p" placeholder="아이디를 입력하세요" value="아이디123" maxlength="15" disabled />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">은행명</h2>
                            <p>
                                <input type="text" placeholder="이름을 입력하세요" class="form-control input-box w100p" value="토디은행" maxlength="15" disabled />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">영업점</h2>
                            <p>
                                <input type="text" placeholder="이름을 입력하세요" class="form-control input-box w100p" value="호매실점" maxlength="15" disabled />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">담당자 이름</h2>
                            <p>
                                <input type="text" placeholder="이름을 입력하세요" class="form-control input-box w100p" value="홍길동" maxlength="15" disabled required />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">휴대폰 번호</h2>
                            <p>
                                <input type="tel" placeholder="휴대폰 번호를 입력하세요" class="form-control input-box w100p" value="010-1111-2222" maxlength="15" disabled required />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">내선 번호</h2>
                            <p>
                                <input type="text" placeholder="내선 번호를 입력하세요" class="form-control input-box w100p" value="031-111-2222" maxlength="15" disabled required />
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">이메일</h2>
                            <p class="input-group">
                                <input type="text" inputmode="signup_email" placeholder="이메일" class="form-control input-box" value="test" maxlength="45" disabled required />
                                <span class="input-group-text input-box">@</span>
                                <input type="text" inputmode="signup_domain" placeholder="도메인" class="form-control input-box" value="naver.com" maxlength="45" disabled required />
                                <select name="" id="domain" class="form-select select-box d-none">
                                    <option value="">직접입력</option>
                                    <option value="naver.com" selected>네이버</option>
                                    <option value="daum.net">다음</option>
                                    <option value="gmail.com">지메일</option>
                                </select>
                            </p>
                        </div>

                        <div>
                            <p class="check-box-red">
                                <input class="form-check-input" type="checkbox" name="opt" id="chk1-1" checked disabled />
                                <label class="form-check-label" for="chk1-1">[선택] 금융신청 알림 수신을 동의합니다.</label>
                            </p>
                        </div>

                        <div>
                            <button id="modify_ready_btn" class="btn-line-red-b w100p" type="button">수정하러 가기</button>
                            <a id="submit_btn" href="#" class="btn-line-red-b w100p d-none" data-izimodal-open="#modalCompletion" data-izimodal-transitionin="fadeInDown">확인</a>
                        </div>
                    </form>
                    <!-- 등록 끝 -->

                <!-- 알림설정 끝 -->

                <!-- 모달 - 저장하기 -->
                <div class="modal-area" id="modalCompletion">
                    <dl class="ma-header">
                        <dt>저장하기</dt>
                        <dd data-izimodal-close=""><i class="fa-light fa-xmark"></i></dd>
                    </dl>
                    <div class="ma-completion">
                        <p id="lottie"></p>
                        <div>
                            <h2><span>저장</span> 하시겠습니까?</h2>
                        </div>
                    </div>
                    <div class="ma-btn">
                        <a href="#" id="save_btn" class="btn-default-m bg-red2 w100" data-izimodal-close="">확인</a>
                        <a href="#" class="btn-default-m bg-gray w100" data-izimodal-close="">취소</a>

                <div class="tool-modal-header">
                    <div class="modal-title">
                      <span class="modal-label">계산기</span>
                      <button class="tool-close-button" aria-label="닫기">X</button>
                    </div>
                </div>
                <div class="tool-modal-body">

                </div>
                <!-- 필요하다면 푸터 등 다른 내용 추가 -->

        <script>
            // 모달 - 수정완료 //
            $("#modalCompletion").iziModal({ width: "470px" });
            $("#modalCompletion").iziModal("setTop", 70);
            $("#modalCompletion").iziModal("setBottom", 70);

            var anmation = bodymovin.loadAnimation({
                container: document.getElementById("lottie"),
                renderer: "svg",
                loop: true,
                autoplay: true,
                path: "/front/assets/lottie/save.json",
            });
        </script>

        <script>
            $(document).ready(function () {
                $("#modify_ready_btn").on("click", function () {
                    $("#submit_btn").removeClass("d-none");
                    $("#domain").removeClass("d-none");
                    $("#modify_ready_btn").addClass("d-none");
                    $("form input").not(":lt(3)").prop("disabled", false);
                });

                $("#save_btn").on("click", function () {
                    $("#submit_btn").addClass("d-none");
                    $("#domain").addClass("d-none");
                    $("#modify_ready_btn").removeClass("d-none");
                    $("form input").not(":lt(3)").prop("disabled", true);
                });
            });
        </script>
