                            </div>
                            <p>
                                <input type="text" id="id" class="form-control input-box w100p" placeholder="" value="" maxlength="15" disabled />
                            </p>

                            <h2 class="label-text">이름 <span class="text-danger">*</span></h2>
                            <p>
                                <input type="text" placeholder="이름을 입력하세요" id="name" class="form-control input-box w100p" value="" maxlength="15" disabled required />

                                <input type="text" inputmode="signup_domain" placeholder="도메인" id="domain" class="form-control input-box" value="" maxlength="45" disabled required />

                                    <option value="" selected>직접입력</option>
                                    <option value="naver.com">네이버</option>
                                    <option value="daum.net">다음</option>
                                    <option value="gmail.com">지메일</option>
                                </select>
                            </p>
                        </div>

                        <div>
                            <h2 class="label-text">휴대폰 번호 <span class="text-danger">*</span></h2>
                            <div>
                                <input type="tel" placeholder="휴대폰 번호를 입력하세요" id="mobile" class="form-control input-box w100p" maxlength="13" disabled required />
                                <!-- <p class="invalid-feedback">연락처 형식(01012345678)에 맞게 입력해주세요.</p> -->

                        </div>

                                    <input class="form-check-input mt-0" type="checkbox" role="switch" id="relationship_fg" data-bs-toggle="collapse" data-bs-target="#job_list_collapse" aria-expanded="false" aria-controls="job_list_collapse" checked disabled />
                                </div>
                            </div>

                            <div id="job_list_collapse" class="collapse show check-box-red" style="margin-top: 15px">

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="job_no_1" data-job_no="8" checked disabled />
                                            <label class="form-check-label" name="job-label" for="job_no_1"> 직군1 </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="job_no_2" data-job_no="8" checked disabled />

                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="job_no_3" data-job_no="8" disabled />
                                            <label class="form-check-label" name="job-label" for="job_no_3"> 직군3 </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
