        <script>
            $(document).ready(function () {

                    dateFormat: "Y-m-d", // 날짜 형식을 yyyy-mm-dd로 설정
                    altFormat: "F j, Y", // altInput이 true일 때 표시할 형식 (옵션)
                    altInput: true, // 보기 편한 형식으로 대체 입력 필드 생성 (옵션)
                    locale: "ko", // 한글 로케일 설정
                });

                $("#estate_type").on("change", function (event) {
                    if ($(this).val() == "003") {
                        $("#factory_input").removeClass("d-none");
                    } else {
                        $("#factory_input").addClass("d-none");
                    }
                });

                $("#modify_ready_btn").on("click", function () {
                    $("#submit_btn").removeClass("d-none");
                    $("#search_address_btn").removeClass("d-none");
                    $("#modify_ready_btn").addClass("d-none");
                    $("form input").prop("disabled", false);
                    $("form select").prop("disabled", false);
                    $("form textarea").prop("disabled", false);
                });

                $("#save_btn").on("click", function () {
                    $("#submit_btn").addClass("d-none");
                    $("#search_address_btn").addClass("d-none");
                    $("#modify_ready_btn").removeClass("d-none");
                    $("form input").prop("disabled", true);
                    $("form select").prop("disabled", true);
