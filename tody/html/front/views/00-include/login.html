<script>
    $(async function () {
        // JavaScript 파일 로드 함수
        function loadScript(src, className, integrity = null, crossorigin = null) {
            if (!document.querySelector(`.${className}`)) {
                let scriptElement = document.createElement("script");
                scriptElement.src = src;
                scriptElement.type = "text/javascript";
                scriptElement.charset = "utf-8";
                scriptElement.className = className;
                if (integrity) {
                    scriptElement.integrity = integrity;
                }
                if (crossorigin) {
                    scriptElement.crossOrigin = crossorigin;
                }
                document.body.appendChild(scriptElement);
            }
        }

        // 카카오 로그인 스크립트 로드
        loadScript("/front/assets/js/kakao.min.js", "kakao-login-script", "sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4", "anonymous");
        //loadScript("https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js", "kakao-login-script", "sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4", "anonymous");
        //loadScript("https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js", "kakao-login-script");

        // 네이버 로그인 스크립트 로드
        loadScript("https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js", "naver-login-script");
        loadScript("/front/assets/js/naveridlogin_js_sdk_2.0.2", "naver-login-sdk-script");

        // 로그인 스크립트 로드
        setTimeout(() => {
            loadScript("/front/js/00-include/login.js", "login-script");
        }, 500);

        // 로그인 스크립트 로드
        setTimeout(() => {
            loadScript("/front/js/visit/client.js", "visit-client-script");
        }, 500);

        // 모달 설정
        const $modalWrap = $(".modal-pop-wrapper");
        $modalWrap.find(".modal-dialog").addClass("modal-dialog-scrollable");

        // [EVENT] 모달 닫기 버튼 클릭 시, login.js 스크립트 제거
        // $("#login_modal_close_btn").on("click", function () {
        //      $(".login-script").remove();
        //      $(".naver-login-script").remove();
        // });
    });
</script>
