<!DOCTYPE html>
<html lang="ko">
    <head>

        <meta property="og:description" content="원스톱 부동산 종합 플랫폼 서비스, 간단한 입력만으로 부동산 정보와 분석, 금융을 한 눈에 빠르고 편한 원스톱 토탈 서비스 지원" />
        <title>토디-팝니다_수정</title>
        <link rel="shortcut icon" href="/front/assets/image/favicon.ico" />

        <!-- Bootstrap Css -->
        <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
        <!-- Sweet Alert css-->
        <link href="/assets/libs/sweetalert2/sweetalert2.min.css" rel="stylesheet" type="text/css" />
        <!-- Custom Css -->
        <link href="/front/assets/css/style.css" rel="stylesheet" />
        <!-- modal Css -->
        <link href="/assets/css/modal.css" rel="stylesheet" type="text/css" />

        <link href="/front/assets/css/mystyle.css" rel="stylesheet" type="text/css" />

        <link href="/assets/css/jquery-ui.css" rel="stylesheet" > <!-- 다운로드한 파일 경로 -->
    </head>
    <body>
        <div class="wrap">
            <!-- 전체모션 -->
            <div class="visual-bg">
                <div class="panel"></div>
            </div>
            <!-- 전체모션 끝 -->

            <!-- PC - 상단 -->
            <header class="header"></header>
            <!-- PC - 상단 끝 -->

            <!-- MOBILE - 상단/메뉴/하단영역 -->
            <div class="mobile"></div>
            <script>
                fetch('00-include/mobile.html')
                    .then(response => response.text())
                    .then(html => {
                        const container = document.querySelector('.mobile');
                        container.innerHTML = html;

                        const bg = container.querySelector('.mobile-menu-info-bg');
                        if (bg) {
                        bg.style.display = 'none'; // display를 명시적으로 다시 숨김
                        // 혹은 bg.classList.add('hidden-class'); 등 원하는 제어 추가 가능
                        }

                        // ★ mobile.html 내용이 DOM에 추가된 후, layout.js의 함수 호출
                        /*
                        if (typeof loadMobile === 'function') {
                            loadMobile();
                        } else {
                            console.warn("loadMobile 함수를 찾을 수 없습니다. layout.js 로드 순서 확인 필요.");
                        }
                        */
                    })
                    .catch(console.error);
              </script>
            <!-- MOBILE - 상단/메뉴/하단영역 끝 -->

            <!-- 본문내용 -->
            <div class="contents">
                <!-- 타이틀 영역 -->
                <div class="title-area">
                    <h2>팝니다 수정</h2>
                </div>
                <!-- 타이틀 영역 끝 -->

                <!-- 수정 -->
                <form class="find-write fw-size1 needs-validation" novalidate>
                    <div>
                        <h2>기본주소를 입력하세요.</h2>
                        <div>
                            <input type="text" id="address_primary" name="address_primary" title="" value="" placeholder="" class="input-box w100p" onclick="openDaumPostcode()" readonly disabled required />
                            <input type="hidden" id="address_road" name="address_road" />
                            <input type="hidden" id="address_jibun" name="address_jibun" />
                            <input type="hidden" id="sigungu_code" name="sigungu_code" />
                            <input type="hidden" id="dong_code" name="dong_code" />
                            <input type="hidden" id="latitude" name="latitude" />
                            <input type="hidden" id="longitude" name="longitude" />
                        </div>
                    </div>
                    <div>
                        <h2>상세주소를 입력하세요.</h2>
                        <div>
                            <input type="text" id="address_detail" name="address_detail" title="" value="" placeholder="" class="input-box w100p" disabled />
                        </div>
                    </div>
                    <div id="kakao_map" class="map-bg position-relative w-100" style="height: 200px"></div>
                    <div>
                        <h2>매물종류를 선택하세요.</h2>
                        <div>
                            <select id="estate_type" name="estate_type" class="form-select select-box w100p" disabled required>
                                <option value="">매물종류 선택</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <h2>거래종류를 선택하세요.</h2>
                        <div class="fw-flex">
                            <select id="sale_type" name="sale_type" class="form-select select-box w100p" disabled required>
                                <option value="">거래종류 선택</option>
                            </select>
                            <div class="check-box-red">
                                <input type="checkbox" name="opt" id="exchange_fg" disabled />
                                <label for="exchange_fg">교환가능</label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h2>가격을 입력하세요.</h2>
                        <div class="fw-flex">
                            <input type="number" id="sale_price" class="input-box w100p" name="" title="" value="" oninput="allowOnlyNumbers(this, 11)" maxlength="100000000" placeholder="" disabled required />
                            <span>만원</span>
                        </div>
                    </div>
                    <div id="rent_price_div" style="display: none">
                        <h2>월세를 입력하세요.</h2>
                        <div class="fw-flex">
                            <input type="number" id="rent_price" class="input-box w100p" name="" title="" value="" oninput="allowOnlyNumbers(this, 11)" maxlength="100000000" placeholder="" disabled />
                            <span>만원</span>
                        </div>
                    </div>
                    <div>
                        <h2>면적을 입력하세요.</h2>
                        <div class="fw-flex">
                            <input type="number" id="area" class="input-box w100p" name="" title="" value="" oninput="allowOnlyNumbers(this, 10)" maxlength="1000000" placeholder="" disabled required />
                            <span>㎡</span>
                        </div>
                    </div>
                    <div>
                        <h2>연락처를 입력하세요.</h2>
                        <div>
                            <p>
                                <input type="tel" id="phone" class="input-box w100p" name="" title="" value="" oninput="allowOnlyNumbers(this, 11)" placeholder="" disabled required />
                            </p>
                        </div>
                    </div>
                    <div>
                        <h2>자세한 설명을 적어주세요.</h2>
                        <div>
                            <textarea id="description" class="w100p" name="" cols="" rows="5" disabled></textarea>
                        </div>
                    </div>
                    <div>
                        <div class="fw-file">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide" style="display: none">
                                    <label type="button" for="file_input" class="d-flex justify-content-center align-items-center"><i class="fa-light fa-plus"></i></label>
                                    <input class="form-control d-none" value="" id="file_input" type="file" accept="image/png, image/gif, image/jpeg" multiple />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <dl>
                            <dt class="gap-2">
                                <button type="button" id="modify_btn" class="btn-line-red">수정하기</button>
                                <button type="button" id="save_btn" class="btn-line-red" style="display: none">저장하기</button>
                                <button type="button" id="delete_btn" class="btn-line-red">삭제하기</button>
                            </dt>
                            <dd>
                                <a href="/front/views/mypage/mypage_put.html" class="btn-default bg-gray">목록으로</a>
                            </dd>
                        </dl>
                    </div>
                </form>
                <!-- 수정 끝 -->
            </div>
            <!-- 본문내용 끝 -->

            <!-- 모달 - 저장확인 -->
            <div class="modal-area" id="modalConfirm">
                <dl class="ma-header">
                    <dt>저장확인</dt>
                    <dd data-izimodal-close=""><i class="fa-light fa-xmark"></i></dd>
                </dl>
                <div class="ma-completion">
                    <p id="lottieConfirm"></p>
                    <div>
                        <h2><span>저장</span> 하시겠습니까?</h2>
                        <!-- <h3><strong>1,345</strong>명에게 알림이 발송 되었습니다.</h3> -->
                    </div>
                </div>
                <div class="ma-btn">
                    <button type="button" id="save_confirm_btn" class="btn-default-m bg-aqua1 w100">확인</button>
                    <a href="#" class="btn-default-m bg-gray w100" data-izimodal-close="">닫기</a>
                </div>
            </div>

            <!-- 모달 - 수정실패 -->
            <div class="modal-area" id="modalFail">
                <dl class="ma-header">
                    <dt>저장실패</dt>
                    <dd data-izimodal-close=""><i class="fa-light fa-xmark"></i></dd>
                </dl>
                <div class="ma-completion">
                    <p id="lottieFail"></p>
                    <div>
                        <h2>저장 중 <span>문제가</span> 발생했습니다.</h2>
                        <!-- <h3><strong>1,345</strong>명에게 알림이 발송 되었습니다.</h3> -->
                    </div>
                </div>
                <!-- <div class="ma-btn">
                <a href="#" class="btn-default-m bg-gray w100" data-izimodal-close=""><i class="fa-light fa-xmark"></i> 닫기</a>
            </div> -->
            </div>

            <!-- 모달 - 저장완료 -->
            <div class="modal-area" id="modalCompletion">
                <dl class="ma-header">
                    <dt>저장완료</dt>
                    <dd data-izimodal-close=""><i class="fa-light fa-xmark"></i></dd>
                </dl>
                <div class="ma-completion">
                    <p id="lottieCompletion"></p>
                    <div>
                        <h2><span>저장</span> 되었습니다.</h2>
                    </div>
                </div>
                <!-- <div class="ma-btn">
                <a href="#" class="btn-default-m bg-gray w100" data-izimodal-close=""><i class="fa-light fa-xmark"></i> 닫기</a>
            </div> -->
            </div>
            <!-- 모달 - 저장완료 끝 -->

            <!-- 모달 - 로딩 -->
            <div class="modal-area" id="modalLoading">
                <dl class="ma-header">
                    <dt>저장중</dt>
                    <!-- <dd data-izimodal-close=""><i class="fa-light fa-xmark"></i></dd> -->
                </dl>
                <div class="ma-completion">
                    <p id="lottieLoading"></p>
                    <div>
                        <h2><span>저장중</span> 입니다.</h2>
                    </div>
                </div>
                <!-- <div class="ma-btn">
                <a href="#" class="btn-default-m bg-gray w100" data-izimodal-close=""><i class="fa-light fa-xmark"></i> 닫기</a>
            </div> -->
            </div>
            <!-- 모달 - 로딩 끝 -->

            <!-- 하단영역 -->
            <footer class="footer"></footer>
            <!-- 하단영역 끝 -->
        </div>

        <!-- JAVASCRIPT -->
        <script src="/assets/libs/bootstrap/js/bootstrap.min.js"></script>
        <script src="/front/assets/js/jquery-3.3.1.js"></script>
        <script src="/front/assets/js/jquery-ui.js"></script>
        <script src="/front/assets/js/easing.js"></script>

        <script src="/front/assets/js/gsap.min.js"></script>
        <script src="/front/assets/js/ScrollTrigger.min.js"></script>
        <script src="/front/assets/js/ScrollToPlugin.min.js"></script>
        <script src="/front/assets/js/SmoothScroll.min.js"></script>

        <script src="/front/assets/js/countup.js"></script>
        <script src="/front/assets/js/waypoints.js"></script>
        <script src="/front/assets/js/aos.js"></script>

        <script src="/front/assets/js/iziModal.js"></script>
        <script src="/front/assets/js/swiper.js"></script>
        <script src="/front/assets/js/multiSelect.js"></script>
        <script src="/front/assets/js/nouislider.js"></script>
        <script src="/front/assets/js/lottie.min.js"></script>
        <script src="/assets/libs/sweetalert2/sweetalert2.min.js"></script>

        <!-- Daum 주소 Api -->
        <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

        <!-- 카카오맵 Api -->
        <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=847d6b0bbbc2dbfe6b7c0c1f82d8cd71&libraries=services"></script>

        <!-- custom -->
        <script src="/front/assets/js/common.js"></script>
        <script src="/front/js/00-include/layout.js"></script>
        <script src="/front/js/00-include/functions.js"></script>
        <script src="/front/js/00-include/validation.js"></script>
        <script src="/front/js/00-include/common.js"></script>
        <script src="/front/js/00-include/layer_popup.js"></script>
        <script src="/front/js/put/put_modify.js"></script>
        <!-- active menu를 위해 추가    -->
        <script src="/front/assets/js/myscript.js"></script>
        <!-- 방문자 통계를 위해 추가 -->
        <script src="/front/js/visit/client.js"></script>

        <!-- 계산기 menu를 위해 추가    -->
        <div id="toolModal" class="toolmodal" style="display: none;">
            <div class="tool-modal-overlay"></div>
            <div class="tool-modal-content"> <!-- 요소가 draggable 대상입니다 -->
                <div class="tool-modal-header">
                    <div class="modal-title">
                      <span class="modal-label">계산기</span>
                      <button class="tool-close-button" aria-label="닫기">X</button>
                    </div>
                </div>
                <div class="tool-modal-body">
                    <!-- 여기에 동적으로 iframe이 삽입될 예정 -->
                </div>
                <!-- 필요하다면 푸터 등 다른 내용 추가 -->
            </div>
        </div>
    </body>
</html>
