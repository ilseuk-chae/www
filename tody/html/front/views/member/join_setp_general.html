            <!-- 본문내용 -->

                <!-- 등록 -->
                <form class="signup fw-size1 needs-validation" novalidate>
                    <div>

                        </div>
                        <p>

                        </p>
                        <div class="invalid-feedback">아이디는 4자 이상 15자 이하로 입력해주세요.</div>
                        <!-- <span class="fw-red">아이디 중복확인을 해주세요.</span> -->
                    </div>

                    <div>
                        <h2 class="label-text">비밀번호</h2>
                        <p>
                            <input type="password" placeholder="비밀번호를 입력하세요" class="form-control input-box w100p" minlength="8" maxlength="12" required />
                        </p>
                        <div class="invalid-feedback">비밀번호는 숫자와 영문자로만 구성되며, 8자 이상 12자 이하로 입력해주세요. (특수문자 사용 불가)</div>
                    </div>

                    <div>
                        <h2 class="label-text">비밀번호 확인</h2>
                        <p>
                            <input type="password" placeholder="비밀번호 확인을 입력하세요" class="form-control input-box w100p" maxlength="20" required />
                        </p>
                        <div class="invalid-feedback">비밀번호가 일치하지 않습니다.</div>
                    </div>

                    <div>

                        </p>
                        <div class="invalid-feedback">이름은 2자 이상 15자 이하로 입력해주세요.</div>
                    </div>

                    <div>

                            <span class="input-group-text input-box">@</span>
                            <input type="text" inputmode="signup_domain" placeholder="도메인" class="form-control input-box" maxlength="11" required />
                            <select name="" id="" class="form-select select-box">
                                <option value="">직접입력</option>
                                <option value="">네이버</option>

                                <option value="">지메일</option>
                            </select>

        <script>
            $("#submit_btn").on("click", function (event) {
                //event.preventDefault();
            });
            // Fetch all the forms we want to apply custom Bootstrap validation styles to
            var forms = document.querySelectorAll(".needs-validation");

            // Loop over them and prevent submission
            Array.prototype.slice.call(forms).forEach(function (form) {
                console.log(form);
                form.addEventListener(
                    "submit",
                    function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault();
                            event.stopPropagation();
                        }

                        form.classList.add("was-validated");
                    },
                    false
                );
            });
        </script>
