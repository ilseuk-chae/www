            body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
            .container { max-width: 1200px; margin: auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
            .date-filter {
                margin-bottom: 05px;
                padding-bottom: 05px;
                border-bottom: 1px solid #eee;
                display: flex;
                align-items: center;
                gap: 10px;

                /* ✨ 추가할 코드 시작 ✨ */
                max-width: 600px; /* 적절한 너비로 조절하세요 (예: 500px, 700px 등) */
                margin-left: auto; /* 상하 마진은 05px 그대로 유지하고 좌우만 auto로 */
                margin-right: auto;
                /* ✨ 추가할 코드 끝 ✨ */
            }

            /* .date-filter 내의 input과 button 스타일은 그대로 둡니다. */
            .date-filter label { font-weight: bold; }
            .date-filter input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
            .date-filter button { padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
            .date-filter button:hover { background-color: #0056b3; }

            .stat-section { display: block; margin-top: 20px; }
            .stat-section.active { display: block; }
            .chart-container { max-width: 100%; height: 400px; margin-bottom: 20px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            table, th, td { border: 1px solid #ddd; }
            th, td { padding: 8px; text-align: left; }
            th { background-color: #f2f2f2; }
        </style>

                            <section id="dailyNewUsers" class="stat-section" style="height:700px; margin-bottom:20px; border:1px solid #abdaa7; padding:10px;">

                                <div class="chart-container" style="height: calc(100% - 30px);"> <!-- 제목 높이를 고려한 차트 컨테이너 높이 -->
                                    <canvas id="dailyNewUsersChart"></canvas>
                                </div>
                                <div id="dailyNewUsersTable" style="display: none;"></div> <!-- 테이블도 chart-container 밖으로 분리하는 것이 좋습니다. -->
                            </section>
                            
                            <section id="dailyVisitors" class="stat-section" style="height:280px; margin-bottom:20px; border:1px solid #abdaa7; padding:10px;">
                                <h3>일별 방문자수</h3>
                                <div class="chart-container" style="height: calc(100% - 30px);">

                                </div>
                                <div id="dailyVisitorsTable" style="display: none;"></div>
                            </section>
                        
                            <section id="hourlyVisitors" class="stat-section" style="height:280px; margin-bottom:20px; border:1px solid #abdaa7; padding:10px;">

                                </div>
                                <div id="hourlyVisitorsTable" style="display: none;"></div>
                            </section>

                                </div>

                            </section>
                        
                            <section id="hourlyDuration" class="stat-section" style="height:280px; margin-bottom:20px; border:1px solid #abdaa7; padding:10px;">

                                </div>
                                <div id="hourlyDurationTable" style="display: none;"></div>
                            </section>
                        
                            <section id="weekdayDuration" class="stat-section" style="height:280px; margin-bottom:20px; border:1px solid #abdaa7; padding:10px;">

                                </div>
