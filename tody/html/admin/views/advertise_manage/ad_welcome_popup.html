<form id="adWelcomForm">
    <div class="input-box mb-3">
        <label for="ad_name" class="col-form-label"><span class="text-danger">*</span> 메인 광고명</label>
        <input type="text" class="form-control" id="ad_name" placeholder="메인 광고명을 입력하세요." minlength="1" maxlength="30" />
        <div class="error" style="color: red"></div>
    </div>

    <div class="input-box mb-3">
        <label for="ad_url" class="col-form-label"><span class="text-danger">*</span> 메인 광고 사이트 주소</label>
        <input type="url" class="form-control" id="ad_url" placeholder="메인 광고 사이트 주소를 입력하세요." minlength="1" maxlength="200" />
        <div class="error" style="color: red"></div>
    </div>

    <div class="input-box mb-3">
        <label for="" class="col-form-label"><span class="text-danger">*</span>메인 광고 이미지 파일(권장: 300x350 px)</label>
        <div class="input-group">
            <label for="file_input" id="file_name" class="input-label form-control text-muted mb-0">파일을 선택하세요.</label>
            <label for="file_input" type="button" class="input-group-text mb-0 waves-effect waves-light">파일선택</label>
            <input type="file" class="form-control d-none" id="file_input" placeholder="이미지" accept="image/png, image/jpeg, image/jpg" />
        </div>
        <div class="error" style="color: red"></div>
    </div>
    <div class="swiper file-upload-swiper">
        <div class="swiper-wrapper"></div>
    </div>
    
    <!-- ⭐⭐⭐ 추가해야 할 숨겨진 입력 필드들 ⭐⭐⭐ -->
    <input type="hidden" id="current_ad_image_name" name="current_ad_image_name" value="">
    <input type="hidden" id="delete_existing_image_flag" name="delete_existing_image_flag" value="0">
    <!-- value는 기본 0으로 설정, 삭제 버튼 클릭 시 1로 변경 -->
     
    <div class="input-box mb-3">
        <label for="" class="col-form-label">광고 표시 설정</label>
    
        <div class="date-range-group" style="display: flex; align-items: center; gap: 10px; border: 1px solid #ced4da; padding:3px;">
        
            <div class="date-input-group" style="display: flex; flex-direction: column;">
                <label for="" class="col-form-label" style= "padding: 4px 0px;"><span class="text-danger">*</span>시작일</label> <!-- 이렇게 그룹 전체를 위한 라벨 -->
                <div class="input-group" style="border: 1px solid #ced4da; width: 105px; padding: 4px;"> <!-- padding 추가 및 width 확장 -->
                    <input type="date" id="start_date" name="start_date" style="width: 95px;">
                </div>
                <div class="error" style="color: red"></div>
            </div>

            <div class="date-input-group" style="display: flex; flex-direction: column;">
                <label for="" class="col-form-label" style= "padding: 4px 0px;"><span class="text-danger">*</span>종료일</label> <!-- 이렇게 그룹 전체를 위한 라벨 -->
                <div class="input-group" style="border: 1px solid #ced4da; width: 105px; padding: 4px;"> <!-- padding 추가 및 width 확장 -->
                    <input type="date" id="end_date" name="end_date" style="width: 95px;">
                </div>
                <div class="error" style="color: red"></div>
            </div>

            <div class="date-input-group" style="display: flex; flex-direction: column;">
                <label for="" class="col-form-label" style= "padding: 4px 0px;">활성화</label> <!-- 이렇게 그룹 전체를 위한 라벨 -->
                <div class="input-group" style="border: 1px solid #ced4da; width: 105px; padding: 4px;"> <!-- padding 추가 및 width 확장 -->
                    <label for="active_fg_y" style="margin-left: 5px; margin-bottom: 0px; cursor: pointer; display: flex; align-items: center;">
                        <input type="radio" id="active_fg_y" name="active_fg" value="Y" style="margin-right: 5px;" checked>
                        Yes
                    </label>
                    
                    <label for="active_fg_n" style="margin-left: 15px; margin-bottom: 0px; cursor: pointer; display: flex; align-items: center;">
                        <input type="radio" id="active_fg_n" name="active_fg" value="N" style="margin-right: 5px;">
                        No
                    </label>
                </div>
                <div class="error" style="color: red"></div>
            </div>
            <div class="date-input-group" style="display: flex; flex-direction: column;">
                <label for="" class="col-form-label" style= "padding: 4px 0px;">보이기</label> <!-- 이렇게 그룹 전체를 위한 라벨 -->
                <div class="input-group" style="border: 1px solid #ced4da; width: 105px; padding: 4px;"> <!-- padding 추가 및 width 확장 -->
                    <label for="show_fg_y" style="margin-left: 5px; margin-bottom: 0px; cursor: pointer; display: flex; align-items: center;">
                        <input type="radio" id="show_fg_y" name="show_fg" value="Y" style="margin-right: 5px;" >
                        Yes
                    </label>
                    
                    <label for="show_fg_n" style="margin-left: 15px; margin-bottom: 0px; cursor: pointer; display: flex; align-items: center;">
                        <input type="radio" id="show_fg_n" name="show_fg" value="N" style="margin-right: 5px;" checked>
                        No
                    </label>
                </div>
                <div class="error" style="color: red"></div>
            </div>
        </div>
    </div>
</form>
