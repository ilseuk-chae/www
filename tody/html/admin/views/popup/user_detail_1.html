<script>
    $(async function () {
        const $modalWrap = $(".modal-pop-wrapper");
        const modalUrl = $modalWrap.attr("data-url");
        const user = getUrlParameter("user", modalUrl);

        // 모달 타이틀
        $modalWrap.find(".modal-title").text("회원정보 수정");

        // 상태 리스트
        status_list();

        // 직군 리스트
        job_list();

        // 유저 정보
        user_info(user);

        $(".save-button").on("click", function () {
            user_info_update(user);
        });
    });
</script>

<div class="modal-header">
    <h5 class="modal-title" id="myModalLabel"></h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
    <div>
        <div class="mb-3">
            <label for="user_id" class="col-form-label">아이디</label>
            <input type="text" class="form-control" id="user_id" disabled />
        </div>

        <div class="mb-3">
            <label for="user_name" class="col-form-label">이름</label>
            <input type="text" class="form-control" id="user_name" placeholder="이름을 입력하세요." minlength="1" maxlength="50" />
            <div class="error" style="color: red"></div>
        </div>

        <div class="mb-3">
            <label for="user_email" class="col-form-label">이메일</label>
            <input type="text" class="form-control" id="user_email" placeholder="이메일을 입력하세요." />
            <div class="error" style="color: red"></div>
        </div>

        <div class="d-flex align-items-center gap-2">
            <label for="relationship_fg" class="col-form-label">부동산 관계여부</label>
            <div class="form-check form-switch form-switch-md mb-0" dir="ltr" data-bs-toggle="collapse" data-bs-target="#job_list_collapse" aria-expanded="false" aria-controls="job_list_collapse">
                <input class="form-check-input" type="checkbox" role="switch" id="relationship_fg" />
            </div>
        </div>

        <div class="mb-3">
            <div id="job_list_collapse" class="collapse">
                <div class="card p-4 border shadow-none my-0">
                    <div id="job_list" class="row gy-3 d-grid grid-cols-5"></div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="user_status" class="col-form-label">상태</label>
            <select class="form-select" id="user_status">
                <option value="" hidden>상태를 선택하세요.</option>
            </select>
            <div class="error" style="color: red"></div>
        </div>
    </div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-light" data-bs-dismiss="modal">닫기</button>
    <button type="button" class="save-button btn btn-primary">저장하기</button>
</div>
