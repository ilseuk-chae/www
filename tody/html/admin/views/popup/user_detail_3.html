<script>
    $(async function () {
        const $modalWrap = $(".modal-pop-wrapper");
        const modalUrl = $modalWrap.attr("data-url");
        const user = getUrlParameter("user", modalUrl);

        // 모달 타이틀
        $modalWrap.find(".modal-title").text("회원정보 수정");

        const c_select = initializeChoices("company_select");
        const b_select = initializeChoices("branch_select");

        // 금융사 리스트
        finance_company_list();

        // 상태 리스트
        status_list();

        // 유저 정보
        user_info(user);

        // [Event] 저장하기 버튼 클릭
        $(".save-button").on("click", function () {
            user_info_update(user);
        });

        // [Event] 비밀번호 초기화
        $("#pw_reset_btn").on("click", function () {
            password_reset(user);
        });
    });
</script>
